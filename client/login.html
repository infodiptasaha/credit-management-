<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Credit Management System</title>
  <meta name="description" content="Sign in to Credit Management System to manage customers and credit entries." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="toast-container"></div>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">💳</div>
        <h1>Credit Manager</h1>
        <p>Professional Credit Management System</p>
      </div>
      <div class="login-error" id="login-error"></div>
      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="username">Username or Email</label>
          <input class="form-control" type="text" id="username" placeholder="Enter your username" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-control" type="password" id="password" placeholder="Enter your password" required autocomplete="current-password" />
        </div>
        <button class="btn btn-primary" type="submit" id="login-btn" style="width:100%;justify-content:center;padding:11px;">
          Sign In
        </button>
      </form>
      <p style="text-align:center;margin-top:18px;font-size:0.78rem;color:var(--text-muted);">
        Default: diptasaha / 1234567
      </p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
